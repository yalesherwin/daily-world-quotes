<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Daily Quote · 世界语录</title>
  <style>
    :root{
      --bg:#070b16;--card:#0f1830;--text:#edf2ff;--muted:#9fb0d9;--gold:#ffd166;--cyan:#6ee7ff;--line:rgba(255,255,255,.15);
    }
    *{box-sizing:border-box}
    body{margin:0;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Noto Sans SC",sans-serif;
      background:
        radial-gradient(1200px 500px at 15% 10%, #21346a 0%, transparent 60%),
        radial-gradient(1000px 400px at 90% 100%, #341b62 0%, transparent 65%),
        linear-gradient(160deg,#050914 0%,#0a1022 45%,#060912 100%);
      min-height:100vh;}
    .wrap{max-width:980px;margin:0 auto;padding:42px 18px 60px}
    .top{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap}
    h1{margin:0;font-size:34px;letter-spacing:.6px}
    .sub{color:var(--muted);margin-top:8px}
    .badge{font-size:12px;padding:7px 11px;border-radius:999px;background:rgba(110,231,255,.13);color:var(--cyan);border:1px solid rgba(110,231,255,.35)}

    .card{margin-top:22px;padding:30px;border:1px solid var(--line);border-radius:22px;
      background:linear-gradient(160deg,rgba(255,255,255,.08),rgba(255,255,255,.02));
      box-shadow:0 20px 60px rgba(0,0,0,.4);backdrop-filter:blur(9px)}
    .date{display:inline-block;font-size:12px;padding:7px 11px;border-radius:999px;background:rgba(255,209,102,.13);color:var(--gold);border:1px solid rgba(255,209,102,.35)}
    .en{margin-top:16px;font-size:32px;line-height:1.45;font-weight:800;letter-spacing:.3px}
    .zh{margin-top:16px;font-size:24px;line-height:1.75;color:#f6f9ff}
    .author{margin-top:18px;color:var(--cyan);font-weight:700;font-size:18px}
    .tip{margin-top:10px;color:var(--muted);font-size:13px}

    .actions{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap}
    .btn{border:1px solid var(--line);background:rgba(255,255,255,.07);color:#fff;padding:10px 16px;border-radius:12px;cursor:pointer;font-weight:700}
    .btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.13)}
    .btn.primary{border-color:rgba(110,231,255,.5);background:rgba(110,231,255,.16);color:var(--cyan)}

    .history{margin-top:28px;padding:20px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.03)}
    .history h3{margin:0 0 12px}
    .item{padding:10px 0;border-bottom:1px dashed rgba(255,255,255,.14)}
    .item:last-child{border-bottom:none}
    .item .d{font-size:12px;color:var(--cyan)}
    .item .q{margin-top:4px;color:#dce5ff}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>每日世界名人名家语录</h1>
        <div class="sub">中英双语 · 不重复（云端每日）· 抖音可直接用</div>
      </div>
      <div class="badge" id="status">READY</div>
    </div>

    <div class="card" id="todayCard">
      <div class="date">加载中...</div>
      <div class="en">...</div>
      <div class="zh">...</div>
      <div class="author"></div>
      <div class="tip">你要求的模式：手动更新会“直接拉新内容”，不是历史轮播。</div>
      <div class="actions">
        <button class="btn primary" id="nextBtn">手动更新下一条（实时拉新）</button>
        <button class="btn" id="copyBtn">复制抖音文案</button>
      </div>
    </div>

    <div class="history">
      <h3>最近语录（仅展示）</h3>
      <div id="history"></div>
    </div>
  </div>

<script>
let todayData = null;
let historyData = [];
const shown = new Set();

function setStatus(t){ document.getElementById('status').textContent = t; }

function renderCard(item, tagText){
  const card = document.getElementById('todayCard');
  card.querySelector('.date').textContent = tagText || `📅 ${item.date || ''}`;
  card.querySelector('.en').textContent = `“${item.quote_en || ''}”`;
  card.querySelector('.zh').textContent = `“${item.quote_zh || ''}”`;
  card.querySelector('.author').textContent = `— ${item.author || '佚名'}`;
}

async function translateZhToEn(text){
  const q = encodeURIComponent(text);
  const url = `https://api.mymemory.translated.net/get?q=${q}&langpair=zh-CN|en`;
  const r = await fetch(url);
  const d = await r.json();
  return d?.responseData?.translatedText?.trim() || text;
}

async function fetchLiveNewQuote(retry=8){
  for (let i=0;i<retry;i++){
    const r = await fetch('https://v1.hitokoto.cn/?encode=json&max_length=90&t=' + Date.now());
    const d = await r.json();
    const zh = (d.hitokoto || '').trim();
    const author = (d.from_who || d.from || '佚名').trim();
    const key = `${zh}|${author}`;
    if (!zh || shown.has(key)) continue;
    shown.add(key);
    const en = await translateZhToEn(zh).catch(()=>zh);
    return {
      id: key,
      date: new Date().toISOString().slice(0,10),
      author,
      quote_zh: zh,
      quote_en: en,
      source: 'https://v1.hitokoto.cn/'
    };
  }
  throw new Error('暂无新内容，请稍后重试');
}

function bindActions(){
  document.getElementById('nextBtn').addEventListener('click', async ()=>{
    try{
      setStatus('UPDATING...');
      const item = await fetchLiveNewQuote();
      todayData = item;
      renderCard(item, `🔄 实时更新 · ${item.date}`);
      setStatus('UPDATED');
    }catch(e){
      alert(e.message || '更新失败，请稍后重试');
      setStatus('RETRY');
    }
  });

  document.getElementById('copyBtn').addEventListener('click', async ()=>{
    if (!todayData) return;
    const text = `${todayData.quote_zh}\n\n${todayData.quote_en}\n\n— ${todayData.author}\n#外贸 #成长 #每日语录`;
    await navigator.clipboard.writeText(text);
    setStatus('COPIED');
  });
}

async function run(){
  setStatus('LOADING...');
  todayData = await fetch('./data/today.json?t=' + Date.now()).then(r=>r.json());
  historyData = await fetch('./data/history.json?t=' + Date.now()).then(r=>r.json()).catch(()=>[]);
  renderCard(todayData, `📅 ${todayData.date}`);
  shown.add(`${todayData.quote_zh}|${todayData.author}`);

  const el = document.getElementById('history');
  el.innerHTML = (historyData || []).slice(0,12).map(x=>`<div class="item"><div class="d">${x.date}</div><div class="q">${x.quote_zh}</div></div>`).join('');

  bindActions();
  setStatus('READY');
}
run();
</script>
</body>
</html>
